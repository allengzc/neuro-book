services:
    app:
        environment:
            DATABASE_KIND: postgres
            DATABASE_URL: ${DATABASE_URL:-postgresql://neuro_book:change-me@postgres:5432/neuro_book}
        depends_on:
            postgres:
                condition: service_healthy

    postgres:
        image: postgres:16-alpine
        environment:
            POSTGRES_USER: ${POSTGRES_USER:-neuro_book}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
            POSTGRES_DB: ${POSTGRES_DB:-neuro_book}
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
            interval: 10s
            timeout: 5s
            retries: 10
        volumes:
            - postgres_data:/var/lib/postgresql/data
        restart: unless-stopped

volumes:
    postgres_data:
